{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="fas fa-paper-plane me-2"></i>{{ title }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Jo'natuvchi kafedra</label>
                            <input type="text" class="form-control" value="{{ user_teacher.department.name|default:'-' }}" readonly disabled>
                            <input type="hidden" name="from_department" value="{{ user_teacher.department.id|default:'' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Qabul qiluvchi kafedra *</label>
                            <select name="to_department" class="form-select" required>
                                <option value="">Tanlang</option>
                                {% for d in departments %}
                                <option value="{{ d.id }}">{{ d.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Fan *</label>
                            <select name="subject" class="form-select" required>
                                <option value="">Tanlang</option>
                                {% for s in subjects %}
                                <option value="{{ s.id }}">{{ s.name }} ({{ s.code }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Taklif qilinayotgan o'qituvchi</label>
                            <select name="teacher" class="form-select">
                                <option value="">Tanlang</option>
                                {% for t in teachers %}
                                <option value="{{ t.id }}">{{ t.get_full_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Semestr *</label>
                            <select name="semester" class="form-select" required>
                                <option value="1">1-semestr</option>
                                <option value="2">2-semestr</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Talabnoma turi</label>
                            <select name="request_type" class="form-select">
                                <option value="standard">Standart</option>
                                <option value="urgent">Shoshilinch</option>
                                <option value="exchange">Almashuv</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Jami soatlar *</label>
                            <input type="number" name="total_hours" class="form-control" required>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Ma'ruza soatlari</label>
                            <input type="number" name="lecture_hours" class="form-control" value="0">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Amaliy soatlar</label>
                            <input type="number" name="practical_hours" class="form-control" value="0">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Laboratoriya soatlari</label>
                            <input type="number" name="lab_hours" class="form-control" value="0">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Xabar</label>
                        <textarea name="message" class="form-control" rows="4" placeholder="Qo'shimcha ma'lumot..."></textarea>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-custom">
                            <i class="fas fa-paper-plane me-2"></i>Yuborish
                        </button>
                        <a href="{% url 'request_list' %}" class="btn btn-secondary">
                            <i class="fas fa-times me-2"></i>Bekor qilish
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
