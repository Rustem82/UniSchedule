{% extends 'base.html' %}

{% block title %}Talabnomani bekor qilish{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-warning text-white">
                <h4 class="mb-0"><i class="fas fa-ban me-2"></i>Talabnomani bekor qilish</h4>
            </div>
            <div class="card-body text-center">
                <i class="fas fa-paper-plane fa-4x text-warning mb-3"></i>
                <h5>Talabnoma #{{ request.id }} ni bekor qilmoqchimisiz?</h5>
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-warning">Bekor qilish</button>
                    <a href="{% url 'request_detail' request.id %}" class="btn btn-secondary">Orqaga</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
