{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">
                    <i class="fas fa-book me-2"></i>{{ title }}
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="name" class="form-label">Fan nomi *</label>
                            <input type="text" class="form-control" id="name" name="name" 
                                   value="{{ subject.name|default:'' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label for="code" class="form-label">Fan kodi *</label>
                            <input type="text" class="form-control" id="code" name="code" 
                                   value="{{ subject.code|default:'' }}" required>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="department" class="form-label">Kafedra *</label>
                            <select class="form-select" id="department" name="department" required>
                                <option value="">Tanlang</option>
                                {% for dept in departments %}
                                <option value="{{ dept.id }}" {% if subject.department.id == dept.id %}selected{% endif %}>
                                    {{ dept.name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="subject_type" class="form-label">Fan turi *</label>
                            <select class="form-select" id="subject_type" name="subject_type" required>
                                <option value="">Tanlang</option>
                                {% for value, label in subject_types %}
                                <option value="{{ value }}" {% if subject.subject_type == value %}selected{% endif %}>
                                    {{ label }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label for="semester" class="form-label">Semestr *</label>
                            <select class="form-select" id="semester" name="semester" required>
                                <option value="">Tanlang</option>
                                {% for value, label in semesters %}
                                <option value="{{ value }}" {% if subject.semester == value %}selected{% endif %}>
                                    {{ label }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="credits" class="form-label">Kreditlar</label>
                            <input type="number" class="form-control" id="credits" name="credits" 
                                   value="{{ subject.credits|default:0 }}" step="1" min="0">
                        </div>
                        <div class="col-md-4">
                            <label for="exam_type" class="form-label">Imtihon turi *</label>
                            <select class="form-select" id="exam_type" name="exam_type" required>
                                <option value="">Tanlang</option>
                                {% for value, label in exam_types %}
                                <option value="{{ value }}" {% if subject.exam_type == value %}selected{% endif %}>
                                    {{ label }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <h5 class="mb-3 mt-4">Soatlar taqsimoti</h5>
                    <div class="row mb-3">
                        <div class="col-md-3">
                            <label for="total_hours" class="form-label">Jami soatlar</label>
                            <input type="number" class="form-control" id="total_hours" name="total_hours" 
                                   value="{{ subject.total_hours|default:0 }}" step="1" min="0">
                        </div>
                        <div class="col-md-3">
                            <label for="lecture_hours" class="form-label">Ma'ruza soatlari</label>
                            <input type="number" class="form-control" id="lecture_hours" name="lecture_hours" 
                                   value="{{ subject.lecture_hours|default:0 }}" step="1" min="0">
                        </div>
                        <div class="col-md-3">
                            <label for="practical_hours" class="form-label">Amaliy soatlar</label>
                            <input type="number" class="form-control" id="practical_hours" name="practical_hours" 
                                   value="{{ subject.practical_hours|default:0 }}" step="1" min="0">
                        </div>
                        <div class="col-md-3">
                            <label for="lab_hours" class="form-label">Laboratoriya soatlari</label>
                            <input type="number" class="form-control" id="lab_hours" name="lab_hours" 
                                   value="{{ subject.lab_hours|default:0 }}" step="1" min="0">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">Tavsif</label>
                        <textarea class="form-control" id="description" name="description" rows="4">{{ subject.description|default:'' }}</textarea>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-custom">
                            <i class="fas fa-save me-2"></i>Saqlash
                        </button>
                        <a href="{% url 'subject_list' %}" class="btn btn-secondary">
                            <i class="fas fa-times me-2"></i>Bekor qilish
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
