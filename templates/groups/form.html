{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">
                    <i class="fas fa-users me-2"></i>{{ title }}
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="name" class="form-label">Guruh nomi *</label>
                        <input type="text" class="form-control" id="name" name="name" 
                               value="{{ group.name|default:'' }}" required>
                        <small class="text-muted">Masalan: A-101, B-202</small>
                    </div>
                    
                    <div class="mb-3">
                        <label for="specialization" class="form-label">Mutaxassislik *</label>
                        <select class="form-select" id="specialization" name="specialization" required>
                            <option value="">Tanlang</option>
                            {% for spec in specializations %}
                            <option value="{{ spec.id }}" {% if group.specialization.id == spec.id %}selected{% endif %}>
                                {{ spec.name }} ({{ spec.code }}) - {{ spec.faculty.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="year_of_admission" class="form-label">Qabul yili *</label>
                            <input type="number" class="form-control" id="year_of_admission" name="year_of_admission" 
                                   value="{{ group.year_of_admission|default:2024 }}" required>
                        </div>
                        <div class="col-md-6">
                            <label for="current_course" class="form-label">Kurs *</label>
                            <select class="form-select" id="current_course" name="current_course" required>
                                {% for value, label in courses %}
                                <option value="{{ value }}" {% if group.current_course == value %}selected{% endif %}>
                                    {{ label }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="student_count" class="form-label">Talabalar soni</label>
                            <input type="number" class="form-control" id="student_count" name="student_count" 
                                   value="{{ group.student_count|default:0 }}" min="0">
                        </div>
                        <div class="col-md-6">
                            <label for="language" class="form-label">Ta'lim tili *</label>
                            <select class="form-select" id="language" name="language" required>
                                {% for value, label in languages %}
                                <option value="{{ value }}" {% if group.language == value %}selected{% endif %}>
                                    {{ label }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="is_active" name="is_active" {% if group.is_active or not group %}checked{% endif %}>
                            <label class="form-check-label" for="is_active">
                                Guruh faol
                            </label>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-custom">
                            <i class="fas fa-save me-2"></i>Saqlash
                        </button>
                        <a href="{% url 'group_list' %}" class="btn btn-secondary">
                            <i class="fas fa-times me-2"></i>Bekor qilish
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
