{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="fas fa-door-open me-2"></i>{{ title }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">Bino *</label>
                            <select name="building" class="form-select" required>
                                <option value="">Tanlang</option>
                                {% for b in buildings %}
                                <option value="{{ b.id }}" {% if room.building.id == b.id %}selected{% endif %}>{{ b.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Xona raqami *</label>
                            <input type="text" name="number" class="form-control" value="{{ room.number|default:'' }}" required>
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-md-4">
                            <label class="form-label">Xona turi *</label>
                            <select name="room_type" class="form-select" required>
                                {% for v, l in room_types %}
                                <option value="{{ v }}" {% if room.room_type == v %}selected{% endif %}>{{ l }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Qavat</label>
                            <input type="number" name="floor" class="form-control" value="{{ room.floor|default:1 }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Sig'imi</label>
                            <input type="number" name="capacity" class="form-control" value="{{ room.capacity|default:0 }}">
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-md-12">
                            <label class="form-label">Jihozlar:</label>
                            <div class="row">
                                <div class="col-md-3"><input type="checkbox" name="has_projector" {% if room.has_projector %}checked{% endif %}> Proyektor</div>
                                <div class="col-md-3"><input type="checkbox" name="has_computer" {% if room.has_computer %}checked{% endif %}> Kompyuter</div>
                                <div class="col-md-3"><input type="checkbox" name="has_whiteboard" {% if room.has_whiteboard %}checked{% endif %}> Doska</div>
                                <div class="col-md-3"><input type="checkbox" name="has_air_conditioner" {% if room.has_air_conditioner %}checked{% endif %}> Konditsioner</div>
                                <div class="col-md-3"><input type="checkbox" name="has_wifi" {% if room.has_wifi %}checked{% endif %}> Wi-Fi</div>
                                <div class="col-md-3"><input type="checkbox" name="is_available" {% if room.is_available or not room %}checked{% endif %}> Mavjud</div>
                            </div>
                        </div>
                    </div>
                    <div class="mt-3">
                        <label class="form-label">Tavsif</label>
                        <textarea name="description" class="form-control" rows="3">{{ room.description|default:'' }}</textarea>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-custom">Saqlash</button>
                        <a href="{% url 'room_list' %}" class="btn btn-secondary">Bekor qilish</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
