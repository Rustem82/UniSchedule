{% extends 'base.html' %}

{% block title %}Kafedralar{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="card">
                <div class="card-header bg-info text-white">
                    <h4 class="mb-0">
                        <i class="fas fa-building me-2"></i>Kafedralar
                    </h4>
                </div>
                <div class="card-body">
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle me-2"></i>
                        {{ message }}
                    </div>
                    <p>Bu bo'lim hali ishlab chiqilmoqda. Tez orada barcha funksiyalar qo'shiladi.</p>
                    <div class="progress mt-3">
                        <div class="progress-bar bg-info" style="width: 30%">30%</div>
                    </div>
                    <a href="/" class="btn btn-custom mt-4">
                        <i class="fas fa-arrow-left me-2"></i>Bosh sahifaga qaytish
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
