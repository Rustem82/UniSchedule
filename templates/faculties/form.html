{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">{{ title }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="name" class="form-label">Nomi *</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ faculty.name|default:'' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="code" class="form-label">Kodi *</label>
                        <input type="text" class="form-control" id="code" name="code" value="{{ faculty.code|default:'' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Tavsif</label>
                        <textarea class="form-control" id="description" name="description" rows="3">{{ faculty.description|default:'' }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-custom">Saqlash</button>
                    <a href="{% url 'faculty_list' %}" class="btn btn-secondary">Bekor qilish</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
