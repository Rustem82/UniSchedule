{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">
                    <i class="fas fa-building me-2"></i>{{ title }}
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="name" class="form-label">Nomi *</label>
                            <input type="text" class="form-control" id="name" name="name" 
                                   value="{{ department.name|default:'' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label for="code" class="form-label">Kodi *</label>
                            <input type="text" class="form-control" id="code" name="code" 
                                   value="{{ department.code|default:'' }}" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="faculty" class="form-label">Fakultet *</label>
                        <select class="form-select" id="faculty" name="faculty" required>
                            <option value="">Tanlang</option>
                            {% for faculty in faculties %}
                            <option value="{{ faculty.id }}" 
                                {% if department.faculty.id == faculty.id %}selected{% endif %}>
                                {{ faculty.name }} ({{ faculty.code }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="head_name" class="form-label">Kafedra mudiri</label>
                        <input type="text" class="form-control" id="head_name" name="head_name" 
                               value="{{ department.head_name|default:'' }}">
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="phone" class="form-label">Telefon</label>
                            <input type="tel" class="form-control" id="phone" name="phone" 
                                   value="{{ department.phone|default:'' }}" placeholder="+998 XX XXX-XX-XX">
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" 
                                   value="{{ department.email|default:'' }}" placeholder="kafedra@example.com">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">Tavsif</label>
                        <textarea class="form-control" id="description" name="description" rows="4">{{ department.description|default:'' }}</textarea>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-custom">
                            <i class="fas fa-save me-2"></i>Saqlash
                        </button>
                        <a href="{% url 'department_list' %}" class="btn btn-secondary">
                            <i class="fas fa-times me-2"></i>Bekor qilish
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
