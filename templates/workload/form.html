{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="fas fa-chart-line me-2"></i>{{ title }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">O'qituvchi *</label>
                            <select name="teacher" class="form-select" required>
                                <option value="">Tanlang</option>
                                {% for t in teachers %}<option value="{{ t.id }}" {% if workload.teacher.id == t.id %}selected{% endif %}>{{ t.get_full_name }}</option>{% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Fan *</label>
                            <select name="subject" class="form-select" required>
                                <option value="">Tanlang</option>
                                {% for s in subjects %}<option value="{{ s.id }}" {% if workload.subject.id == s.id %}selected{% endif %}>{{ s.name }}</option>{% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-md-6">
                            <label class="form-label">Guruh *</label>
                            <select name="group" class="form-select" required>
                                <option value="">Tanlang</option>
                                {% for g in groups %}<option value="{{ g.id }}" {% if workload.group.id == g.id %}selected{% endif %}>{{ g.name }}</option>{% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Semestr *</label>
                            <select name="semester" class="form-select" required>
                                {% for v, l in semesters %}<option value="{{ v }}" {% if workload.semester == v %}selected{% endif %}>{{ l }}</option>{% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-md-3">
                            <label class="form-label">Ma'ruza soatlari</label>
                            <input type="number" name="lecture_hours" class="form-control" value="{{ workload.lecture_hours|default:0 }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Amaliy soatlar</label>
                            <input type="number" name="practical_hours" class="form-control" value="{{ workload.practical_hours|default:0 }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Laboratoriya</label>
                            <input type="number" name="lab_hours" class="form-control" value="{{ workload.lab_hours|default:0 }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Mustaqil ta'lim</label>
                            <input type="number" name="independent_hours" class="form-control" value="{{ workload.independent_hours|default:0 }}">
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-md-6">
                            <label class="form-label">O'quv yili *</label>
                            <input type="text" name="academic_year" class="form-control" value="{{ workload.academic_year|default:'2024-2025' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Izoh</label>
                            <textarea name="notes" class="form-control" rows="2">{{ workload.notes|default:'' }}</textarea>
                        </div>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-custom">Saqlash</button>
                        <a href="{% url 'workload_list' %}" class="btn btn-secondary">Bekor qilish</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
